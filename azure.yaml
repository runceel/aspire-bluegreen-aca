# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: aspire-bluegreen-aca
metadata:
  template: aspire-bluegreen-aca@2.0.0

# Aspire AppHost service. Aspire 13.4 approach: `aspire publish` generates bicep,
# then `az deployment` applies it. Platform resources (VNet, SQL, Front Door) are
# deployed separately; Aspire references them via bicepparam.
services:
  app:
    language: dotnet
    project: ./AspireBlueGreen.AppHost/AspireBlueGreen.AppHost.csproj

# NOTE: there is intentionally NO preprovision hook. Platform resources (VNet,
# SQL, Front Door) are deployed explicitly by scripts/up.ps1 / preview.ps1 BEFORE
# aspire publish, so that subsequent `aspire publish` can reference them.
hooks:
  # Runs after the main deployment (triggered by scripts/deploy.ps1).
  # Configures Front Door origin and validates traffic state.
  postdeploy:
    windows:
      shell: pwsh
      continueOnError: false
      interactive: false
      run: |
        ./scripts/configure-frontdoor-origin.ps1
        ./scripts/reconcile-traffic.ps1
    posix:
      shell: pwsh
      continueOnError: false
      interactive: false
      run: |
        ./scripts/configure-frontdoor-origin.ps1
        ./scripts/reconcile-traffic.ps1
